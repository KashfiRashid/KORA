<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KORA mark — a woven roundel">
  <defs>
    <clipPath id="c"><circle cx="32" cy="32" r="27"/></clipPath>
  </defs>
  <circle cx="32" cy="32" r="27" stroke="#1A1815" stroke-width="2.2" fill="none"/>
  <g clip-path="url(#c)" stroke-linecap="round">
    <!-- warp (vertical threads) -->
    <line x1="22" y1="6" x2="22" y2="58" stroke="#B4552D" stroke-width="1.6"/>
    <line x1="28" y1="6" x2="28" y2="58" stroke="#B4552D" stroke-width="1.6"/>
    <line x1="36" y1="6" x2="36" y2="58" stroke="#B4552D" stroke-width="1.6"/>
    <line x1="42" y1="6" x2="42" y2="58" stroke="#B4552D" stroke-width="1.6"/>
    <!-- weft (horizontal thread) -->
    <line x1="6" y1="32" x2="58" y2="32" stroke="#1A1815" stroke-width="2"/>
  </g>
</svg>
